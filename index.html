function Auth({ onLogin, onRegister }) { const [mode, setMode] = useState("login"); const [f, setF] = useState({ username: "ucitel", password: "1234", name: "", role: "student", grade: 5 }); const set = (k,v) => setF(o => ({...o,[k]:v})); return <div className="min-h-screen bg-slate-950 p-4 text-white"><Background/><div className="relative mx-auto grid max-w-6xl gap-6 py-8 lg:grid-cols-[1.1fr_.9fr]"><div className="rounded-[2rem] border border-white/10 bg-white/10 p-8 backdrop-blur-xl"><Brand/><p className="mt-10 text-sm font-black uppercase tracking-[.3em] text-cyan-300">EduVerse MAX</p><h1 className="mt-3 text-5xl font-black md:text-7xl">Školská appka ako hra.</h1><p className="mt-5 text-lg text-slate-300">Učiteľ spravuje triedu, zadáva DÚ a tvorí testy. Žiak robí lekcie, kvízy, kartičky a zbiera XP.</p><div className="mt-6 rounded-3xl bg-slate-950/60 p-4">Demo: <b>ucitel / 1234</b> alebo <b>ziak / 1234</b></div></div><div className="rounded-[2rem] border border-white/10 bg-white/10 p-6 backdrop-blur-xl"><div className="grid grid-cols-2 gap-2 rounded-2xl bg-slate-950/60 p-2"><button onClick={() => setMode("login")} className={cn("rounded-xl py-3 font-black", mode === "login" ? "bg-white text-slate-950" : "")}>Login</button><button onClick={() => setMode("register")} className={cn("rounded-xl py-3 font-black", mode === "register" ? "bg-white text-slate-950" : "")}>Účet</button></div><div className="mt-5 space-y-3">{mode === "register" && <Input label="Meno" value={f.name} onChange={v => set("name", v)}/>}<Input label="Používateľské meno" value={f.username} onChange={v => set("username", v)}/><Input label="Heslo" type="password" value={f.password} onChange={v => set("password", v)}/>{mode === "register" && <><Select label="Typ" value={f.role} onChange={v => set("role", v)} opts={[["student","Žiak"],["teacher","Učiteľ"]]}/>{f.role === "student" && <Select label="Ročník" value={f.grade} onChange={v => set("grade", Number(v))} opts={[1,2,3,4,5,6,7,8,9].map(g => [g, `${g}. ročník`])}/>}</>}<button onClick={() => mode === "login" ? onLogin(f.username, f.password) : onRegister(f)} className="w-full rounded-2xl bg-white py-4 font-black text-slate-950">{mode === "login" ? "Prihlásiť" : "Vytvoriť účet bez mailu"}</button></div></div></div></div>; }
function Student({ db, user, progress, modules, tab, setTab, open, quiz, flash, toggleSave }) { const myAss = db.assignments.filter(a => a.studentIds.includes(user.id) || (!a.studentIds.length && a.classId === user.classId)); const gradeModules = modules.filter(m => m.grade === user.grade); if (tab === "learn") return <Learn modules={modules} progress={progress} open={open} quiz={quiz} flash={flash} toggleSave={toggleSave} defaultGrade={user.grade}/>; if (tab === "library") return <Library modules={modules} progress={progress} open={open} quiz={quiz} flash={flash} toggleSave={toggleSave} setTab={setTab}/>; if (tab === "assignments") return <Assignments assignments={myAss} modules={modules} progress={progress} open={open} quiz={quiz}/>; if (tab === "practice") return <Practice modules={gradeModules} progress={progress} quiz={quiz} flash={flash}/>; const l = level(progress.xp); const avg = Object.values(progress.quizScores).length ? Math.round(Object.values(progress.quizScores).reduce((a,b)=>a+b,0)/Object.values(progress.quizScores).length) : 0; return <section className="space-y-5"><Header eyebrow="Žiak" title={`Vitaj, ${user.name}.`} desc="Dnes môžeš dokončiť úlohu, prejsť lekciu alebo si uložiť tému do knižnice."/><div className="grid gap-4 md:grid-cols-4"><Stat title="Level" value={l.level} desc={`${l.current}/350 XP`} icon="⭐"/><Stat title="XP" value={progress.xp} desc="spolu" icon="💎"/><Stat title="Priemer" value={`${avg}%`} desc="testy" icon="📈"/><Stat title="DÚ" value={myAss.length} desc="zadané" icon="📌"/></div><Panel title="Odporúčané lekcie"><div className="grid gap-3 md:grid-cols-2">{gradeModules.slice(0,6).map(m => <ModuleRow key={m.id} m={m} p={progress} open={open} quiz={quiz}/>)}</div></Panel></section>; }
function Learn({ modules, progress, open, quiz, flash, toggleSave, defaultGrade }) { const [q,setQ]=useState(""); const [grade,setGrade]=useState(String(defaultGrade)); const [sid,setSid]=useState("all"); const shown=modules.map(m=>({m,s:scoreSearch(m,q)})).filter(x=>(!q||x.s>0)&&(grade==="all"||x.m.grade===Number(grade))&&(sid==="all"||x.m.subjectId===sid)).sort((a,b)=> q ? b.s-a.s : a.m.grade-b.m.grade).map(x=>x.m); return <section className="space-y-5"><Header eyebrow="Inteligentné vyhľadávanie" title="Nájdi lekciu" desc="Hľadaj podľa ročníka, predmetu, otázok, tagov alebo názvu."/><div className="rounded-3xl border border-white/10 bg-white/10 p-4"><div className="grid gap-3 lg:grid-cols-[1fr_200px_180px]"><Input value={q} onChange={setQ} placeholder="napr. zlomky, metafora, percentá"/><Select value={sid} onChange={setSid} opts={[["all","Všetky predmety"],...SUBJECTS.map(s=>[s.id,s.name])]}/><Select value={grade} onChange={setGrade} opts={[["all","Všetky ročníky"],...[1,2,3,4,5,6,7,8,9].map(g=>[g,`${g}. ročník`])]}/></div></div><div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{shown.map(m=><ModuleCard key={m.id} m={m} p={progress} open={open} quiz={quiz} flash={flash} save={() => toggleSave(m.id)} saved={progress.savedLessons.includes(m.id)}/>)}</div></section>; }
function Library({ modules, progress, open, quiz, flash, toggleSave, setTab }) { const saved=progress.savedLessons.map(id=>modules.find(m=>m.id===id)).filter(Boolean); return <section className="space-y-5"><Header eyebrow="Moja knižnica" title="Uložené lekcie" desc="Témy na neskôr, opakovanie alebo test."/><div className="grid gap-4 md:grid-cols-3"><Stat title="Uložené" value={saved.length} desc="lekcií" icon="⭐"/><Stat title="Hotové" value={saved.filter(m=>progress.completedLessons.includes(m.id)).length} desc="lekcií" icon="✅"/><Stat title="Testy" value={saved.filter(m=>progress.quizScores[m.id]).length} desc="spravené" icon="🧠"/></div>{saved.length ? <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{saved.map(m=><ModuleCard key={m.id} m={m} p={progress} open={open} quiz={quiz} flash={flash} save={() => toggleSave(m.id)} saved/>)}</div> : <Empty title="Knižnica je prázdna" desc="Otvor Učenie a klikni na hviezdičku pri lekcii." button={() => setTab("learn")}/>}</section>; }
function Assignments({ assignments, modules, progress, open, quiz }) { return <section className="space-y-5"><Header eyebrow="Moje úlohy" title="Domáce úlohy" desc="Dokonči lekciu alebo kvíz a učiteľ uvidí progres."/><div className="grid gap-4 md:grid-cols-2">{assignments.map(a=>{const m=modules.find(x=>x.id===a.moduleId); if(!m)return null; const done=a.completedBy.includes(progress.profile?.id)||progress.assignmentLog[m.id]; return <div key={a.id} className="rounded-3xl border border-white/10 bg-white/10 p-5"><p className="text-sm text-slate-400">Do: {a.due}</p><h3 className="text-xl font-black">{a.title}</h3><p className="mt-2 text-slate-300">{a.instructions}</p><p className="mt-2 text-sm text-slate-400">{m.subject.name} · {m.title}</p><div className="mt-4 flex gap-2"><button onClick={()=>open(m.id)} className="rounded-2xl bg-white px-4 py-2 font-black text-slate-950">Lekcia</button><button onClick={()=>quiz(m.id)} className="rounded-2xl bg-white/10 px-4 py-2 font-black">Kvíz</button></div></div>})}</div>{!assignments.length && <Empty title="Žiadne úlohy" desc="Zatiaľ nič zadané."/>}</section>; }

function Teacher({ db, user, modules, tab, setDb, setToast, open, quiz }) { if(tab==="assign") return <TeacherAssign db={db} user={user} modules={modules} setDb={setDb} setToast={setToast}/>; if(tab==="lessons") return <TeacherLessons modules={modules} open={open} quiz={quiz}/>; if(tab==="library") return <TeacherLibrary db={db} user={user} modules={modules} setDb={setDb} setToast={setToast} open={open} quiz={quiz}/>; if(tab==="creator") return <Creator user={user} setDb={setDb} setToast={setToast}/>; if(tab==="data") return <Data db={db} setDb={setDb}/>; return <TeacherClass db={db} user={user} setDb={setDb} setToast={setToast}/>; }
function TeacherClass({db,user,setDb,setToast}) { const classes=db.classes.filter(c=>c.teacherId===user.id); const [cid,setCid]=useState(classes[0]?.id||""); const cls=classes.find(c=>c.id===cid)||classes[0]; const students=cls?cls.studentIds.map(id=>db.users.find(u=>u.id===id)).filter(Boolean):[]; const [f,setF]=useState({name:"Nový žiak",username:"",password:"1234",grade:5}); function addStudent(){ if(!cls)return; const username=(f.username||f.name).trim().toLowerCase().replaceAll(" ","_"); if(db.users.some(u=>u.username===username)) return setToast("Login už existuje"); const id=uid("student"); const u={id,username,passwordHash:hash(f.password),role:"student",name:f.name,grade:Number(f.grade),classId:cls.id,avatar:"🦊"}; setDb(old=>({...old,users:[...old.users,u],classes:old.classes.map(c=>c.id===cls.id?{...c,studentIds:[...c.studentIds,id]}:c),progress:{...old.progress,[id]:blankProgress(Number(f.grade),f.name)}})); setToast("Žiak pridaný"); } return <section className="space-y-5"><Header eyebrow="Učiteľ" title="Trieda a žiaci" desc="Pridávaj žiakov menom a heslom, bez e-mailu."/><div className="grid gap-5 lg:grid-cols-[.8fr_1.2fr]"><Panel title="Pridať žiaka"><Select value={cid} onChange={setCid} opts={classes.map(c=>[c.id,c.name])}/><div className="mt-3 space-y-2"><Input placeholder="Meno" value={f.name} onChange={v=>setF({...f,name:v})}/><Input placeholder="Login" value={f.username} onChange={v=>setF({...f,username:v})}/><Input placeholder="Heslo" value={f.password} onChange={v=>setF({...f,password:v})}/><Select value={f.grade} onChange={v=>setF({...f,grade:Number(v)})} opts={[1,2,3,4,5,6,7,8,9].map(g=>[g,`${g}. ročník`])}/><button onClick={addStudent} className="w-full rounded-2xl bg-emerald-400 py-3 font-black text-slate-950">Pridať</button></div></Panel><Panel title="Žiaci"><div className="space-y-2">{students.map(s=>{const p=db.progress[s.id]||blankProgress(s.grade,s.name); const avg=Object.values(p.quizScores).length?Math.round(Object.values(p.quizScores) function TeacherAssign({db,user,modules,setDb,setToast}) { const classes=db.classes.filter(c=>c.teacherId===user.id); const [f,setF]=useState({classId:classes[0]?.id||"",moduleId:modules[0]?.id||"",title:"",instructions:"Sprav lekciu a kvíz.",due:"piatok"}); function add(){ const m=modules.find(x=>x.id===f.moduleId); if(!m)return; setDb(old=>({...old,assignments:[{id:uid("ass"),teacherId:user.id,classId:f.classId,studentIds:[],moduleId:m.id,title:f.title||`Dokončiť: ${m.title}`,instructions:f.instructions,due:f.due,completedBy:[]},...old.assignments]})); setToast("DÚ zadaná"); } return <section className="space-y-5"><Header eyebrow="Zadania" title="Domáce úlohy" desc="Vyber lekciu a triedu."/><Panel title="Nová úloha"><div className="grid gap-3"><Select value={f.classId} onChange={v=>setF({...f,classId:v})} opts={classes.map(c=>[c.id,c.name])}/><Select value={f.moduleId} onChange={v=>setF({...f,moduleId:v})} opts={modules.map(m=>[m.id,`${m.grade}. ${m.subject.name} · ${m.title}`])}/><Input placeholder="Názov" value={f.title} onChange={v=>setF({...f,title:v})}/><Textarea value={f.instructions} onChange={v=>setF({...f,instructions:v})}/><Input placeholder="Termín" value={f.due} onChange={v=>setF({...f,due:v})}/><button onClick={add} className="rounded-2xl bg-white py-3 font-black text-slate-950">Zadať</button></div></Panel></section>; }
function TeacherLessons({modules,open,quiz}) { const [g,setG]=useState("all"); const [sid,setSid]=useState("all"); const shown=modules.filter(m=>(g==="all"||m.grade===Number(g))&&(sid==="all"||m.subjectId===sid)); return <section className="space-y-5"><Header eyebrow="Lekcie" title="180 lekcií pre 1.–9. ročník" desc="Učiteľ ich môže otvoriť alebo zadať ako DÚ."/><div className="grid gap-3 md:grid-cols-2"><Select value={g} onChange={setG} opts={[["all","Všetky ročníky"],...[1,2,3,4,5,6,7,8,9].map(x=>[x,`${x}. ročník`])]}/><Select value={sid} onChange={setSid} opts={[["all","Všetky predmety"],...SUBJECTS.map(s=>[s.id,s.name])]}/></div><div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{shown.slice(0,80).map(m=><ModuleCard key={m.id} m={m} p={blankProgress(m.grade)} open={open} quiz={quiz} flash={()=>{}} readOnly/>)}</div></section>; }
function TeacherLibrary({db,user,modules,setDb,setToast,open,quiz}) { const mine=modules.filter(m=>m.creatorId===user.id); function del(id){ if(!confirm("Zmazať test?")) return; setDb(old=>({...old,customModules:old.customModules.filter(m=>m.id!==id),assignments:old.assignments.filter(a=>a.moduleId!==id)})); } function copy(m){ setDb(old=>({...old,customModules:[{...m,id:uid("custom"),title:m.title+" – kópia"},...old.customModules]})); setToast("Skopírované"); } return <section className="space-y-5"><Header eyebrow="Učiteľská knižnica" title="Tvoje vytvorené testy" desc="Sem sa ukladajú testy z tvorcu."/><div className="grid gap-4 md:grid-cols-3"><Stat title="Moje testy" value={mine.length} desc="vytvorené" icon="⭐"/><Stat title="Otázky" value={mine.reduce((s,m)=>s+m.questions.length,0)} desc="spolu" icon="🧠"/><Stat title="DÚ" value={db.assignments.filter(a=>mine.some(m=>m.id===a.moduleId)).length} desc="použité" icon="📝"/></div><div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">{mine.map(m=><div key={m.id} className="rounded-3xl border border-white/10 bg-white/10 p-5"><h3 className="text-xl font-black">{m.title}</h3><p className="text-sm text-slate-400">{m.grade}. · {m.subject.name} · {m.questions.length} otázok</p><p className="mt-3 text-slate-300 line-clamp-3">{m.explanation}</p><div className="mt-4 grid grid-cols-2 gap-2"><button onClick={()=>open(m.id)} className="rounded-2xl bg-white py-2 font-black text-slate-950">Otvoriť</button><button onClick={()=>quiz(m.id)} className="rounded-2xl bg-white/10 py-2 font-black">Náhľad</button><button onClick={()=>copy(m)} className="rounded-2xl bg-white/10 py-2 font-black">Kópia</button><button onClick={()=>del(m.id)} className="rounded-2xl bg-red-500/20 py-2 font-black text-red-100">Zmazať</button></div></div>)}</div>{!mine.length && <Empty title="Prázdna knižnica" desc="Vytvor test v Tvorcovi."/>}</section>; }
function Creator({user,setDb,setToast}) { const [f,setF]=useState({title:"Moja vlastná lekcia",grade:5,subjectId:"matematika",explanation:"Sem napíš vysvetlenie.",example:"Sem napíš príklad.",challenge:"Sem napíš výzvu.",question:"Ukážková otázka?",correct:"Správna odpoveď",wrong1:"Zlá odpoveď 1",wrong2:"Zlá odpoveď 2",wrong3:"Zlá odpoveď 3"}); function create(){ const s=subject(f.subjectId); const m={id:uid("custom"),creatorId:user.id,grade:Number(f.grade),subjectId:f.subjectId,subject:s,title:f.title,explanation:f.explanation,example:f.example,challenge:f.challenge,minutes:10,xp:100,tags:["vlastné",s.name],objectives:[`Pochopiť ${f.title}`,"Otestovať sa"],flashcards:[{front:f.title,back:f.explanation},{front:"Príklad",back:f.example}],questions:[{type:"choice",q:f.question,options:[f.correct,f.wrong1,f.wrong2,f.wrong3],answer:0,explanation:`Správne: ${f.correct}`},{type:"fill",q:"Doplň správnu odpoveď: _____",answer:f.correct,accepted:[f.correct]},{type:"true_false",q:`Pravda alebo nepravda: ${f.correct}`,answer:true},{type:"short",q:`Krátko vysvetli: ${f.title}`,answer:f.correct,accepted:[f.correct]}]}; setDb(old=>({...old,customModules:[m,...old.customModules]})); setToast("Test uložený do učiteľskej knižnice"); } return <section className="space-y-5"><Header eyebrow="Tvorca" title="Vytvor vlastný test/lekciu" desc="Bez PDF importu. Učiteľ zadá učivo a otázku ručne."/><Panel title="Nový test"><div className="grid gap-3 md:grid-cols-2"><Input label="Názov" value={f.title} onChange={v=>setF({...f,title:v})}/><Select label="Predmet" value={f.subjectId} onChange={v=>setF({...f,subjectId:v})} opts={SUBJECTS.map(s=>[s.id,s.name])}/><Select label="Ročník" value={f.grade} onChange={v=>setF({...f,grade:Number(v)})} opts={[1,2,3,4,5,6,7,8,9].map(g=>[g,`${g}. ročník`])}/><Textarea label="Vysvetlenie" value={f.explanation} onChange={v=>setF({...f,explanation:v})}/><Textarea label="Príklad" value={f.example} onChange={v=>setF({...f,example:v})}/><Textarea label="Výzva" value={f.challenge} onChange={v=>setF({...f,challenge:v})}/><Input label="Otázka" value={f.question} onChange={v=>setF({...f,question:v})}/><Input label="Správna odpoveď" value={f.correct} onChange={v=>setF({...f,correct:v})}/><Input label="Zlá odpoveď 1" value={f.wrong1} onChange={v=>setF({...f,wrong1:v})}/><Input label="Zlá odpoveď 2" value={f.wrong2} onChange={v=>setF({...f,wrong2:v})}/><Input label="Zlá odpoveď 3" value={f.wrong3} onChange={v=>setF({...f,wrong3:v})}/></div><button onClick={create} className="mt-4 rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Vytvoriť test/lekciu</button></Panel></section>; }
function Data({db,setDb}){ return <section className="space-y-5"><Header eyebrow="Dáta" title="Nastavenia" desc="Offline verzia používa localStorage v prehliadači."/><Panel title="Dáta"><div className="flex gap-3"><button onClick={()=>{localStorage.removeItem(DB_KEY); setDb(defaultDb());}} className="rounded-2xl bg-red-500/20 px-5 py-3 font-black text-red-100">Resetovať</button><button onClick={()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='eduverse-data.json';a.click();}} className="rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Export JSON</button></div><pre className="mt-4 max-h-96 overflow-auto rounded-3xl bg-slate-950/60 p-4 text-xs text-slate-300">{JSON.stringify(db,null,2)}</pre></Panel></section> }
function LessonModal({module,progress,onClose,onComplete,onQuiz,readOnly}){ const [step,setStep]=useState(0); const steps=["Ciele","Výklad","Príklad","Výzva"]; return <Modal onClose={onClose} wide><div className="grid gap-5 lg:grid-cols-[.7fr_1.3fr]"><div className="rounded-3xl bg-slate-950/60 p-5"><div className={cn("grid h-16 w-16 place-items-center rounded-3xl bg-gradient-to-br text-4xl",module.subject.color)}>{module.subject.emoji}</div><h2 className="mt-4 text-3xl font-black">{module.title}</h2><p className="text-slate-400">{module.grade}. ročník · {module.subject.name}</p><div className="mt-5 space-y-2">{steps.map((s,i)=><button key={s} onClick={()=>setStep(i)} className={cn("w-full rounded-2xl px-4 py-3 text-left font-black",step===i?"bg-white text-slate-950":"bg-white/10")}>{s}</button>)}</div></div><div className="rounded-3xl border border-white/10 bg-white/10 p-6"><h3 className="text-3xl font-black">{steps[step]}</h3><div className="mt-5 text-lg leading-8 text-slate-200">{step===0&&<ul className="space-y-3">{module.objectives.map(o=><li key={o} className="rounded-2xl bg-slate-950/50 p-4">✅ {o}</li>)}</ul>}{step===1&&module.explanation}{step===2&&module.example}{step===3&&module.challenge}</div><div className="mt-6 flex justify-between"><button onClick={()=>setStep(Math.max(0,step-1))} className="rounded-2xl bg-white/10 px-5 py-3 font-black">Späť</button>{step<3?<button onClick={()=>setStep(step+1)} className="rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Ďalej</button>:<div className="flex gap-2">{!readOnly&&<button onClick={onComplete} className="rounded-2xl bg-emerald-400 px-5 py-3 font-black text-slate-950">Dokončiť</button>}<button onClick={onQuiz} className="rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Kvíz</button></div>}</div></div></div></Modal> }
function QuizModal({module,onClose,onSave,readOnly}){ const [i,setI]=useState(0); const [ans,setAns]=useState({}); const [done,setDone]=useState(false); const q=module.questions[i]; const sc=Math.round(module.questions.reduce((sum,x,idx)=>sum+(correct(x,ans[idx])?1:0),0)/module.questions.length*100); if(done) return <Modal onClose={onClose}><div className="text-center"><div className="text-7xl">{sc>=80?'🏆':'📚'}</div><h2 className="mt-4 text-5xl font-black">{sc}%</h2><p className="mt-2 text-slate-300">Správne {module.questions.filter((x,idx)=>correct(x,ans[idx])).length} z {module.questions.length}.</p><button onClick={onClose} className="mt-6 rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Zavrieť</button></div></Modal>; function finish(){setDone(true); if(!readOnly)onSave(module,sc)} return <Modal onClose={onClose}><p className="text-sm font-black uppercase tracking-[.2em] text-cyan-300">Otázka {i+1}/{module.questions.length} · {q.type||'choice'}</p><h2 className="mt-2 text-3xl font-black">{module.title}</h2><h3 className="mt-6 text-2xl font-black">{q.q}</h3><Question q={q} ans={ans[i]} setAns={v=>setAns(o=>({...o,[i]:v}))}/>{hasAnswer(q,ans[i])&&<div className={cn("mt-5 rounded-3xl border p-4",correct(q,ans[i])?"border-emerald-300/30 bg-emerald-400/10":"border-amber-300/30 bg-amber-400/10")}><b>{correct(q,ans[i])?'Správne':'Skontroluj'}</b><p className="text-slate-300">{q.explanation}</p></div>}<div className="mt-6 flex justify-between"><button onClick={()=>setI(Math.max(0,i-1))} className="rounded-2xl bg-white/10 px-5 py-3 font-black">Späť</button>{i<module.questions.length-1?<button disabled={!hasAnswer(q,ans[i])} onClick={()=>setI(i+1)} className="rounded-2xl bg-white px-5 py-3 font-black text-slate-950 disabled:opacity-40">Ďalej</button>:<button disabled={module.questions.some((x,idx)=>!hasAnswer(x,ans[idx]))} onClick={finish} className="rounded-2xl bg-emerald-400 px-5 py-3 font-black text-slate-950 disabled:opacity-40">Vyhodnotiť</button>}</div></Modal> }
function Question({q,ans,setAns}){ if((q.type||'choice')==='true_false') return <div className="mt-5 grid grid-cols-2 gap-3"><button onClick={()=>setAns(true)} className={cn("rounded-3xl border p-4 font-black",ans===true?"bg-cyan-400/20 border-cyan-300":"bg-white/10 border-white/10")}>Pravda</button><button onClick={()=>setAns(false)} className={cn("rounded-3xl border p-4 font-black",ans===false?"bg-cyan-400/20 border-cyan-300":"bg-white/10 border-white/10")}>Nepravda</button></div>; if(['fill','short'].includes(q.type)) return <input value={ans||''} onChange={e=>setAns(e.target.value)} className="mt-5 w-full rounded-3xl border border-white/10 bg-slate-950/60 p-4 outline-none" placeholder="Napíš odpoveď"/>; if(q.type==='multi') return <div className="mt-5 grid gap-3">{q.options.map((o,idx)=><button key={idx} onClick={()=>setAns((ans||[]).includes(idx)?ans.filter(x=>x!==idx):[...(ans||[]),idx])} className={cn("rounded-3xl border p-4 text-left",(ans||[]).includes(idx)?"bg-cyan-400/20 border-cyan-300":"bg-white/10 border-white/10")}>{(ans||[]).includes(idx)?'☑':'☐'} {o}</button>)}</div>; return <div className="mt-5 grid gap-3">{q.options.map((o,idx)=><button key={idx} onClick={()=>setAns(idx)} className={cn("rounded-3xl border p-4 text-left font-bold",ans===idx?"bg-cyan-400/20 border-cyan-300":"bg-white/10 border-white/10")}>{String.fromCharCode(65+idx)}. {o}</button>)}</div>; }
function FlashModal({module,onClose}){ const [i,setI]=useState(0),[flip,setFlip]=useState(false); const c=module.flashcards[i]; return <Modal onClose={onClose}><h2 className="text-3xl font-black">Kartičky · {module.title}</h2><button onClick={()=>setFlip(!flip)} className="mt-6 grid min-h-72 w-full place-items-center rounded-3xl border border-white/10 bg-white/10 p-8 text-center"><div><p className="text-sm uppercase tracking-[.2em] text-slate-400">{flip?'Odpoveď':'Otázka'}</p><p className="mt-4 text-3xl font-black">{flip?c.back:c.front}</p></div></button><button onClick={()=>{setFlip(false);setI((i+1)%module.flashcards.length)}} className="mt-5 w-full rounded-2xl bg-white py-3 font-black text-slate-950">Ďalšia</button></Modal> }
function Nav({items,tab,setTab}){ return <nav className="mt-4 space-y-2">{items.map(([id,icon,label])=><button key={id} onClick={()=>setTab(id)} className={cn("flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left font-bold",tab===id?"bg-white text-slate-950":"text-slate-300 hover:bg-white/10")}>{icon} {label}</button>)}</nav> }
function Mobile({user,tab,setTab,logout}){ const items=user.role==='student' ? [["dashboard","🏠"],["assignments","📌"],["learn","🎓"],["library","⭐"],["practice","⚡"]] : [["class","🏫"],["assign","📝"],["lessons","📚"],["library","⭐"],["creator","✨"],["data","⚙️"]]; return <div className="mb-5 rounded-3xl border border-white/10 bg-white/10 p-4 lg:hidden"><div className="flex items-center justify-between"><Brand/><button onClick={logout} className="rounded-2xl bg-white px-3 py-2 font-black text-slate-950">Odhlásiť</button></div><div className="grid grid-cols-5 gap-2">{items.map(([id,ic])=><button key={id} onClick={()=>setTab(id)} className={cn("rounded-2xl py-2 text-xl",tab===id?"bg-white text-slate-950":"bg-white/10")}>{ic}</button>)}</div></div> }
function ModuleCard({m,p,open,quiz,flash,save,saved,readOnly}){ const percent=p?.completedLessons?.includes(m.id)?100:p?.quizScores?.[m.id]?50:0; return <article className="rounded-[2rem] border border-white/10 bg-white/10 p-5 backdrop-blur-xl"><div className="flex justify-between"><div className={cn("grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br text-3xl",m.subject.color)}>{m.subject.emoji}</div><div className="flex gap-2"><span className="rounded-full bg-slate-950/60 px-3 py-1 text-xs">{m.grade}. ročník</span>{save&&<button onClick={save} className="rounded-full bg-white/10 px-3 py-1">{saved?'★':'☆'}</button>}</div></div><h3 className="mt-4 text-xl font-black">{m.title}</h3><p className="mt-2 line-clamp-3 text-sm text-slate-300">{m.explanation}</p><div className="mt-4 h-2 rounded-full bg-white/10"><div className="h-2 rounded-full bg-gradient-to-r from-cyan-400 to-violet-500" style={{width:`${percent}%`}}/></div><div className="mt-5 grid grid-cols-3 gap-2"><button onClick={()=>open(m.id)} className="rounded-2xl bg-white py-3 font-black text-slate-950">Lekcia</button><button onClick={()=>quiz(m.id)} className="rounded-2xl bg-white/10 py-3 font-black">Kvíz</button><button disabled={readOnly} onClick={()=>flash(m.id)} className="rounded-2xl bg-white/10 py-3 font-black disabled:opacity-40">Karty</button></div></article> }
function ModuleRow({m,p,open,quiz}){ return <div className="rounded-3xl border border-white/10 bg-slate-950/50 p-4"><div className="flex items-center justify-between gap-3"><div><b>{m.subject.emoji} {m.title}</b><p className="text-sm text-slate-400">{m.subject.name} · {m.grade}. ročník</p></div><button onClick={()=>quiz(m.id)} className="rounded-xl bg-white px-3 py-2 font-black text-slate-950">Test</button></div></div> }
function Header({eyebrow,title,desc}){ return <div className="rounded-[2rem] border border-white/10 bg-white/10 p-6 backdrop-blur-xl"><p className="text-sm font-black uppercase tracking-[.25em] text-cyan-300">{eyebrow}</p><h2 className="mt-2 text-4xl font-black md:text-5xl">{title}</h2><p className="mt-3 text-slate-300">{desc}</p></div> }
function Panel({title,children}){ return <div className="rounded-[2rem] border border-white/10 bg-white/10 p-5 backdrop-blur-xl"><h3 className="mb-4 text-xl font-black">{title}</h3>{children}</div> }
function Stat({title,value,desc,icon}){ return <div className="rounded-3xl border border-white/10 bg-white/10 p-5"><div className="flex justify-between"><div><p className="text-sm text-slate-400">{title}</p><p className="text-3xl font-black">{value}</p><p className="text-sm text-slate-300">{desc}</p></div><span className="text-3xl">{icon}</span></div></div> }
function UserCard({user,progress,logout}){ const l=progress?level(progress.xp):null; return <div className="rounded-3xl bg-slate-950/60 p-4"><div className="flex items-center gap-3"><div className="grid h-14 w-14 place-items-center rounded-2xl bg-white text-3xl">{user.avatar}</div><div><b>{user.name}</b><p className="text-sm text-slate-400">{user.role==='teacher'?'Učiteľ':`${user.grade}. ročník · level ${l.level}`}</p></div></div>{progress&&<div className="mt-4 h-2 rounded-full bg-white/10"><div className="h-2 rounded-full bg-cyan-400" style={{width:`${l.pct}%`}}/></div>}<button onClick={logout} className="mt-4 w-full rounded-2xl bg-white/10 py-2 font-bold">Odhlásiť</button></div> }
function Brand(){ return <div className="mb-4 flex items-center gap-3"><div className="grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 text-2xl">✦</div><div><h1 className="font-black">EduVerse MAX</h1><p className="text-xs text-slate-400">ZŠ platforma</p></div></div> }
function Background(){ return <div className="pointer-events-none fixed inset-0 overflow-hidden"><div className="absolute -top-32 left-1/3 h-72 w-72 rounded-full bg-cyan-500/20 blur-3xl"/><div className="absolute right-10 top-40 h-80 w-80 rounded-full bg-fuchsia-500/20 blur-3xl"/><div className="absolute bottom-0 left-10 h-72 w-72 rounded-full bg-emerald-500/10 blur-3xl"/></div> }
function Modal({children,onClose,wide=false}){ return <div onMouseDown={onClose} className="fixed inset-0 z-50 grid place-items-center bg-black/70 p-4 backdrop-blur-sm"><div onMouseDown={e=>e.stopPropagation()} className={cn("max-h-[92vh] w-full overflow-auto rounded-[2rem] border border-white/10 bg-slate-900 p-6",wide?'max-w-6xl':'max-w-2xl')}><div className="mb-4 flex justify-end"><button onClick={onClose} className="rounded-xl bg-white/10 px-4 py-2 font-black">✕</button></div>{children}</div></div> }
function Toast({children}){ return <div className="fixed bottom-5 left-1/2 z-[60] -translate-x-1/2 rounded-3xl bg-white px-5 py-4 font-black text-slate-950 shadow-2xl">{children}</div> }
function Empty({title,desc,button}){ return <div className="rounded-[2rem] border border-white/10 bg-white/10 p-10 text-center"><div className="text-6xl">🔍</div><h3 className="mt-4 text-2xl font-black">{title}</h3><p className="mt-2 text-slate-300">{desc}</p>{button&&<button onClick={button} className="mt-4 rounded-2xl bg-white px-5 py-3 font-black text-slate-950">Nájsť lekcie</button>}</div> }
function Input({label,value,onChange,type="text",placeholder=""}){ return <label className="block"><span className="mb-1 block text-sm font-bold text-slate-300">{label}</span><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 outline-none focus:border-cyan-300"/></label> }
function Textarea({label,value,onChange}){ return <label className="block"><span className="mb-1 block text-sm font-bold text-slate-300">{label}</span><textarea value={value} onChange={e=>onChange(e.target.value)} rows="4" className="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 outline-none focus:border-cyan-300"/></label> }
function Select({label,value,onChange,opts}){ return <label className="block"><span className="mb-1 block text-sm font-bold text-slate-300">{label}</span><select value={value} onChange={e=>onChange(e.target.value)} className="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 outline-none">{opts.map(([v,t])=><option key={v} value={v}>{t}</option>)}</select></label> }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
